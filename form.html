<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="styles.css">
</head>
<body>
<form>
    <h1>Student Registration</h1>
    
    <div class="form-field"> 
        <label>Roll no.:</label>
        <input type="text" name="roll-no">
    </div>

    <div class="form-field"> 
        <label>Student name:</label>
        <div class="input-wrap">
            <input type="text" name="firstname" placeholder="First Name">-
            <input type="text" name="lastname" placeholder="Last Name">
        </div>
    </div>

    <div class="form-field"> 
        <label>Father's name:</label>
        <input type="text" name="father-name">
    </div>

    <div class="form-field"> 
        <label>Date of birth:</label>
        <div class="input-wrap">
            <input type="text" name="date-of-birth" placeholder="Day">-
            <input type="text" name="date-of-birth" placeholder="Month">-
            <input type="text" name="date-of-birth" placeholder="Year">
        </div>
    </div>

    <div class="form-field"> 
        <label>Mobile no.:</label>
        <input type="text" name="mobile-no" placeholder="+91">
        <input type="text" name="mobile-no">
    </div>

    <div class="form-field">    
        <label>Email id:</label>
        <input type="email" name="email-id">
    </div>

    <div class="form-field"> 
        <label>Password:</label>
        <input type="password" name="password">
    </div>

    <div class="form-field"> 
        <label>Gender:</label>
        <input type="radio" name="gender" value="male">Male
        <input type="radio" name="gender" value="female">Female
    </div>

    <div class="form-field"> 
        <label>Department:</label>
        <div class="input-wrap">
            <input type="checkbox" name="department" value="cse">CSE
            <input type="checkbox" name="department" value="it">IT
            <input type="checkbox" name="department" value="ece">ECE
            <input type="checkbox" name="department" value="civil">Civil
            <input type="checkbox" name="department" value="mech">Mech
        </div>
    </div>

    <div class="form-field"> 
        <label>Course:</label>
        <select name="course">
            <option value="">---------select courses-------------</option>
            <option value="physics">Physics</option>
            <option value="chemistry">Chemistry</option>
            <option value="biology">Biology</option>
        </select>
    </div>

    <div class="form-field"> 
        <label>Student photo:</label>
        <input type="file" name="student-photo">
    </div>

    <div class="form-field"> 
        <label>City:</label>
        <input type="text" name="city">
    </div>

    <div class="form-field"> 
        <label>Address:</label>
        <textarea rows="3" cols="20"></textarea>
    </div>

    <div class="form-field"> 
    <button type="submit">Register</button>
    </div>
</form>
</body>
</html>

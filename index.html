<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <h2>Application form</h2>
        <div class="form-second">
            <div class="form-first">
                <label>First name:</label>
                <input type="text" name="firstname">
            </div>

            <div class="form-first">
                <label>Last name:</label>
                <input type="text" name="lastname">
            </div>
        </div>

        <div class="form-second">
            <div class="form-first">
                <label>Date of Birth:</label>
                <input type="date" name="dateofbirth">
            </div>

            <div class="form-first">
                <label>Age:</label>
                <input type="number" name="age">
            </div>
        </div>

        <div class="form-second">
            <div class="form-first">
                <label>Gender:</label>
                <select name="Gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option> 
                </select>
            </div>

            <div class="form-first">
                <label>Email Address:</label>
                <input type="email" name="email" placeholder="Enter email address">
            </div>
        </div>

        <div class="form-first">
            <label>Position Available:</label>
            <div class="form-wrap">
                <input type="radio" name="positionavailable" value="juniordeveloper">Junior Developer
                <input type="radio" name="positionavailable" value="midleveldeveloper">Mid Level Developer
                <input type="radio" name="positionavailable" value="seniordeveloper">Senior Developer
            </div>
        </div>

        <div class="form-first">
            <label>Programming Languages:</label>
            <div class="form-wrap">
                <input type="checkbox" name="programminglanguages" value="java">Java
                <input type="checkbox" name="programminglanguages" value="javascript">JavaScript
                <input type="checkbox" name="programminglanguages" value="python">Python
            </div>
        </div>

        <div class="form-second">
            <div class="form-first">
                <label>Password:</label>
                <input type="password" name="password">
            </div>

            <div class="form-first">
                <label>Confirm Password:</label>
                <input type="password" name="confirmpassword">
            </div>
        </div>

        <div class="form-second">
            <div class="form-first">
            <button type="submit">Submit</button>
            </div>

            <div class="form-first">
            <button type="reset">Reset</button>
            </div>
        </div>
    </form>
</body>
</html>
